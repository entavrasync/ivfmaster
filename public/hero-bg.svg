<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" color-rendering="optimizeQuality">
  <defs>

    <!-- ── Film grain ─────────────────────────────────────────────────────── -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.70 0.68"
        numOctaves="4" seed="9" stitchTiles="stitch" result="f-noise"/>
      <feColorMatrix type="saturate" values="0" in="f-noise"/>
    </filter>

    <!-- ── Gaussian blur library ──────────────────────────────────────────── -->
    <!-- Wide filters for large soft forms -->
    <filter id="b65" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
    <filter id="b45" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="b22" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="b8" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- ── Background: ivory, bright upper-left ───────────────────────────── -->
    <linearGradient id="g-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FBF7F1"/>
      <stop offset="65%"  stop-color="#FBF7F1"/>
      <stop offset="100%" stop-color="#F3EDE6"/>
    </linearGradient>

    <!-- Very faint periwinkle blush — drifts from lower-right toward center,
         stays below 8% so the left text zone is completely unaffected -->
    <radialGradient id="g-peri-drift" cx="82%" cy="58%" r="48%">
      <stop offset="0%"   stop-color="#97A6D2" stop-opacity="0.13"/>
      <stop offset="55%"  stop-color="#97A6D2" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#97A6D2" stop-opacity="0"/>
    </radialGradient>

    <!-- Navy: lower edge, settles gently into the bottom -->
    <linearGradient id="g-navy-bottom" x1="0%" y1="58%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2E4F8E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2E4F8E" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Navy: lower-left corner depth -->
    <radialGradient id="g-navy-ll" cx="0%" cy="100%" r="38%">
      <stop offset="0%"   stop-color="#2E4F8E" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2E4F8E" stop-opacity="0"/>
    </radialGradient>

    <!-- Navy: lower-right corner depth -->
    <radialGradient id="g-navy-lr" cx="100%" cy="100%" r="32%">
      <stop offset="0%"   stop-color="#2E4F8E" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#2E4F8E" stop-opacity="0"/>
    </radialGradient>

    <!-- Seed outer aura: blush warmth radiating from the focal point -->
    <radialGradient id="g-seed-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#EDD0D9" stop-opacity="0.70"/>
      <stop offset="38%"  stop-color="#CACCEC" stop-opacity="0.28"/>
      <stop offset="72%"  stop-color="#97A6D2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#97A6D2" stop-opacity="0"/>
    </radialGradient>

    <!-- Seed core: pure warm white → blush -->
    <radialGradient id="g-seed-core" cx="46%" cy="44%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="16%"  stop-color="#FFF0F4"/>
      <stop offset="48%"  stop-color="#E2849C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E2849C" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- ═══════════════════════════════════════════════════════════════════════
       LAYER STACK (bottom → top)
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- 1. Ivory base — clean and fully dominant -->
  <rect width="1600" height="900" fill="url(#g-base)"/>

  <!-- 2. Faint periwinkle drift, right side only -->
  <rect width="1600" height="900" fill="url(#g-peri-drift)"/>

  <!-- 3. Navy depth: bottom edge + two lower corners -->
  <rect width="1600" height="900" fill="url(#g-navy-bottom)"/>
  <rect width="1600" height="900" fill="url(#g-navy-ll)"/>
  <rect width="1600" height="900" fill="url(#g-navy-lr)"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       FOCAL METAPHOR — right side of canvas (~78% x)
       Three barely-there soft forms "cradling" the seed of light.
       stdDeviation 65 reduces opacity to <0.3% at 200 px from edge,
       so nothing bleeds into the text column on the left.
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- 4a. LEFT protective form — tall soft ellipse, periwinkle -->
  <!--     Blurred at 65px: entirely invisible by x ≈ 920 (text zone is x < 860) -->
  <ellipse cx="1100" cy="452" rx="68" ry="228"
    fill="#A8B4D4" filter="url(#b65)" opacity="0.26"/>

  <!-- 4b. RIGHT protective form — mirror, slightly softer -->
  <ellipse cx="1462" cy="452" rx="68" ry="228"
    fill="#A8B4D4" filter="url(#b65)" opacity="0.20"/>

  <!-- 4c. BOTTOM cradle — wide flat ellipse, navy-tinted, barely there -->
  <!--     Suggests something supporting from below -->
  <ellipse cx="1280" cy="645" rx="210" ry="44"
    fill="#2E4F8E" filter="url(#b65)" opacity="0.10"/>

  <!-- 4d. A secondary inner periwinkle cusp — adds soft definition to the
           left-arm form without sharpening it -->
  <ellipse cx="1138" cy="448" rx="30" ry="140"
    fill="#C2CAEC" filter="url(#b45)" opacity="0.18"/>

  <!-- 4e. Mirror inner cusp right -->
  <ellipse cx="1425" cy="448" rx="30" ry="140"
    fill="#C2CAEC" filter="url(#b45)" opacity="0.14"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SEED OF LIGHT — the focal warmth
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- 5a. Seed outer blush aura — large, very soft -->
  <ellipse cx="1280" cy="428" rx="195" ry="188"
    fill="url(#g-seed-aura)" filter="url(#b45)" opacity="0.92"/>

  <!-- 5b. Seed inner core — warm white with blush edge -->
  <ellipse cx="1280" cy="422" rx="66" ry="62"
    fill="url(#g-seed-core)" filter="url(#b22)" opacity="0.96"/>

  <!-- 5c. Seed bright nucleus — the tiniest concentrated point of light -->
  <circle cx="1280" cy="416" r="18"
    fill="#FFFFFF" filter="url(#b8)" opacity="0.84"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       FILM GRAIN — 4.5% opacity, monochromatic
       ═══════════════════════════════════════════════════════════════════════ -->
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.045" fill="#BBBBBB"/>

</svg>
